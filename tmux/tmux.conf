# -----------------------------------------------------------------------------
# Basic behavior
# -----------------------------------------------------------------------------

# Allow scrolling, pane selection, and resizing with the mouse.
set -g mouse on

# Keep a large scrollback history so you can review older terminal output.
set -g history-limit 100000

# Start window numbering at 1 instead of 0.
set -g base-index 1

# Start pane numbering at 1 instead of 0.
setw -g pane-base-index 1

# Renumber windows after one is closed so numbering stays compact.
set -g renumber-windows on

# Let tmux integrate with the system clipboard when supported.
set -g set-clipboard on

# Tell applications inside tmux which terminal features to expect.
# `tmux-256color` is the modern default for tmux itself.
set -g default-terminal "tmux-256color"

# Advertise truecolor/RGB support to terminals that understand xterm-256color.
set-option -a terminal-features 'xterm-256color:RGB'

# Enable extended keys for Shift+Enter support in TUI apps (Claude Code, etc.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'


# -----------------------------------------------------------------------------
# Prefix key
# -----------------------------------------------------------------------------

# Remove tmux's default prefix of Ctrl-b.
unbind C-b

# Use Ctrl-Space as the prefix key (matches nvim leader key feel).
set -g prefix C-Space

# Pressing Ctrl-Space twice sends a literal Ctrl-Space through to the program inside tmux.
bind C-Space send-prefix


# -----------------------------------------------------------------------------
# Copy mode / key style
# -----------------------------------------------------------------------------

# Use Vim-style keys in copy mode (hjkl, /, ?, etc.).
setw -g mode-keys vi


# -----------------------------------------------------------------------------
# Reloading config
# -----------------------------------------------------------------------------

# Reload ~/.tmux.conf without restarting tmux.
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"


# -----------------------------------------------------------------------------
# Window and pane creation
# -----------------------------------------------------------------------------

# Open a new window in the current pane's working directory.
bind c new-window -c "#{pane_current_path}"

# Split horizontally in the current pane's working directory.
bind | split-window -h -c "#{pane_current_path}"

# Split vertically in the current pane's working directory.
bind - split-window -v -c "#{pane_current_path}"


# -----------------------------------------------------------------------------
# Pane navigation
# -----------------------------------------------------------------------------

# Smart Ctrl+h/j/k/l pane navigation — no prefix needed.
# If the active pane is running nvim or fzf, the key is sent through to that
# program instead of switching panes.  This means Ctrl+h/j/k/l work for both
# tmux pane switching and Neovim window navigation without any remapping on
# the nvim side.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'


# -----------------------------------------------------------------------------
# Copy mode helpers for macOS
# -----------------------------------------------------------------------------

# Start a visual selection in copy mode with `v`.
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy the selection to the macOS clipboard with `y`.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Copy a mouse selection to the macOS clipboard when dragging ends.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"


# -----------------------------------------------------------------------------
# Status bar
# -----------------------------------------------------------------------------

# Refresh the status bar every 5 seconds.
set -g status-interval 5

# Reserve enough space for the left and right status sections.
set -g status-left-length 40
set -g status-right-length 80

# Set the default foreground/background colors for the status bar.
set -g status-style "bg=default,fg=#545c7e"

# Left side of the status bar: show the current session name.
set -g status-left "#[fg=#7aa2f7,bold] #S "

# Right side of the status bar: show host name and current time.
set -g status-right "#[fg=#7aa2f7]#H #[fg=#545c7e]| %H:%M "

# Style inactive windows in the status bar.
setw -g window-status-format "#[fg=#545c7e] #I:#W "

# Style the active window so it stands out.
setw -g window-status-current-format "#[fg=#1f2335,bg=#7aa2f7,bold] #I:#W "


# -----------------------------------------------------------------------------
# Pane borders
# -----------------------------------------------------------------------------

# Dim the borders of inactive panes.
set -g pane-border-style "fg=#414868"

# Highlight the border of the active pane.
set -g pane-active-border-style "fg=#7aa2f7"


# -----------------------------------------------------------------------------
# Plugins (TPM)
# -----------------------------------------------------------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore sessions on tmux start
set -g @continuum-restore 'on'

# Initialize TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
